<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Frota TI — Registro de Saída</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-glow"></div>

  <div class="wrapper">

    <header class="header">
      <div class="header-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="3" width="15" height="13" rx="2"/>
          <path d="M16 8h4l3 5v3h-7V8z"/>
          <circle cx="5.5" cy="18.5" r="2.5"/>
          <circle cx="18.5" cy="18.5" r="2.5"/>
        </svg>
      </div>
      <div class="header-text">
        <span class="header-label">FROTA TI</span>
        <h1 class="header-title">Registro de Saída</h1>
      </div>
    </header>

    <div class="card">

      <div class="field-group">
        <label for="nomecondutor" class="label">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Condutor
        </label>
        <input type="text" id="nomecondutor" class="input" placeholder="Nome completo" autocomplete="name" />
      </div>

      <div class="row-fields">
        <div class="field-group">
          <label for="datasaida" class="label">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Data
          </label>
          <input type="date" id="datasaida" class="input" />
        </div>
        <div class="field-group">
          <label for="horasaida" class="label">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Horário
          </label>
          <input type="time" id="horasaida" class="input" />
        </div>
      </div>

      <div class="field-group">
        <label for="carrousado" class="label">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
          Veículo
        </label>
        <div class="select-wrapper">
          <select id="carrousado" class="input select">
            <option value="">Selecione o veículo</option>
            <option value="Nissan">Nissan</option>
            <option value="Nissan">Mobi</option>
           
          </select>
          <svg class="select-arrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>

      <div class="field-group">
        <label for="motivouso" class="label">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Motivo da Saída
        </label>
        <textarea id="motivouso" class="input textarea" placeholder="Descreva o destino e motivo..."></textarea>
      </div>

      <button id="btnRegistrar" class="btn-submit" onclick="registrarSaida()">
        <span class="btn-text">Registrar Saída</span>
        <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>

    </div>

    <div id="toast" class="toast"></div>

  </div>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const now = new Date();
      const pad = n => String(n).padStart(2, "0");
      document.getElementById("datasaida").value =
        `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
      document.getElementById("horasaida").value =
        `${pad(now.getHours())}:${pad(now.getMinutes())}`;
    });

    async function registrarSaida() {
      const btn = document.getElementById("btnRegistrar");

      const dados = {
        nomecondutor: document.getElementById("nomecondutor").value.trim(),
        datasaida:    document.getElementById("datasaida").value,
        horasaida:    document.getElementById("horasaida").value,
        carrousado:   document.getElementById("carrousado").value,
        motivouso:    document.getElementById("motivouso").value.trim()
      };

      if (!dados.nomecondutor || !dados.datasaida || !dados.horasaida || !dados.carrousado || !dados.motivouso) {
        mostrarToast("Preencha todos os campos.", "erro");
        return;
      }

      btn.disabled = true;
      btn.classList.add("loading");

      try {
        const resposta = await fetch("http://localhost:5000/registrar-saida", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(dados)
        });
        const json = await resposta.json();

        if (resposta.ok) {
          mostrarToast("Saída registrada com sucesso!", "sucesso");
          document.getElementById("nomecondutor").value = "";
          document.getElementById("carrousado").value = "";
          document.getElementById("motivouso").value = "";
        } else {
          mostrarToast(json.erro || "Erro ao registrar.", "erro");
        }
      } catch {
        mostrarToast("Servidor offline. Verifique o backend.", "erro");
      }

      btn.disabled = false;
      btn.classList.remove("loading");
    }

    function mostrarToast(texto, tipo) {
      const t = document.getElementById("toast");
      t.textContent = texto;
      t.className = `toast show ${tipo}`;
      setTimeout(() => t.classList.remove("show"), 3500);
    }
  </script>

</body>
</html>
